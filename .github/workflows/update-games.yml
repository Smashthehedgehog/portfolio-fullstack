name: Update Backloggd Games

on:
  schedule:
    - cron: '0 4 * * *'   # 4am UTC daily
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      - name: Scrape Backloggd
        run: node scripts/scrape-backloggd.mjs
        working-directory: backend

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/games.json backend/game-covers
          git diff --staged --quiet || git commit -m "chore: update Backloggd games cache"
          git push
